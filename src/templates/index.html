<!DOCTYPE html>
<html>
<head>
    <!--Title of home page-->
    <title>
        Stock Predictor
    </title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; text-align: center; }
        #tvchart { width: 80%; height: 500px; margin: 20px auto; border: 1px solid #333; }
        select, button{ padding: 10px; font-size: 16px; margin-top: 20px; background: #2b2b2b; color: white; border: 1px solid #555;}
       #loading-container { width: 100%; height: 4px; background: #333; }
       #loading-bar { width: 0%; height: 100%; background: #4caf50; transition: width 0.3s ease; display: none; }
        @keyframes loading {0% { width: 0%; } 100% { width: 100%; }}
    </style>
</head>
<body>
    <h1>Stock Predictor</h1>
    <section>
        <label>Select stock
            <select id="Select-Stock">
                <option value="GC=F">Gold</option>
                <option value="EURUSD=X">EUR/USD</option>
                <option value="AUDUSD=X">AUD/USD</option>
                <option value="GBPUSD=X">GBP/USD</option>
                <option value="USDJPY=X">USD/JPY</option>
            </select>
        </label>
        <label>Select timeframe
            <select id="Select-Timeframe">
                <option value="1m">1 minute</option>
                <option value="5m">5 minutes</option>
                <option value="15m">15 minutes</option>
                <option value="1h">1 hour</option>
                <option value="1d">1 day</option>
            </select>
        </label>
        <button type="button" class="News-btn">View Current News for Stock</button>
        <button type="button" class="Predict-btn">Start Prediction</button>
    </section>
    <div id="loading-container">
        <div id="loading-bar" class="loading-bar" style="display: none;"></div>
    </div>
    <div id="tvchart"></div>
    <div id="prediction-panel" style="display: none; width: 80%; margin: 20px auto; text-align: left; background: #1e1e1e; padding: 20px; border-radius: 8px; border: 1px solid #333;"></div>
    <script src="static/view.js"></script>
</body>
