version: '3.8'

services:
  trading-bot:
    build: .
    container_name: quant-bot-live
    ports:
      - "5000:5000"
    volumes:
      # This maps your local folders to the container so it can see your newly trained models
      - ./models:/app/models
      - ./data:/app/data
    environment:
      # We will pass your OpenAI key securely here!
      - OPENAI_API_KEY=${key}
    restart: unless-stopped